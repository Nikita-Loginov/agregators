<head>
  <meta lang="en" />

  />

  <link

    sizes="180x180"
    href="/img/favicon/apple-touch-icon.png"
  />
  <link

    type="image/png"

  />
  <link

    sizes="16x16"

  />

  <link
    rel="preload"
    href="/fonts/Roboto-Regular.woff2"
    as="font"
    type="font/woff2"
    crossorigin
  />
  <link
    rel="preload"
    href="/fonts/Roboto-Medium.woff2"
    as="font"
    type="font/woff2"
    crossorigin
  />
  <link rel="stylesheet" href="/css/fonts.css" />

  <link rel="stylesheet" href="/css/critical.css" />

  @@if (typeof pageSimple === 'undefined') {
  <link
    rel="preload"
    href="/css/lib/intlTelInput.css"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <link
    rel="stylesheet"
    href="/css/page.css"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />

  <noscript>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"
    />

    <link rel="stylesheet" href="/css/page.css" />
  </noscript>
  } @@if (typeof pageSimple !== 'undefined') {
  <link
    rel="preload"
    href="/css/page-simple.css"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link rel="stylesheet" href="/css/page-simple.css" />
  </noscript>
  } @@for (link in links) {
  <link
    rel="preload"
    href="`+links[link]+`"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link rel="stylesheet" href="`+links[link]+`" />
  </noscript>
  }
  <noscript>
    <style>
      .swiper-wrapper {
        display: flex;
        gap: 12px;
      }
      .swiper-slide {
        flex: 0 0 calc(25% - 12px);
      }
      .swiper.swiper--gallery-small .swiper-wrapper {
        flex-direction: column;
      }

      .swiper--good-img .swiper-wrapper {
        grid-template-columns: repeat(1, 1fr);
        flex: 0 0 calc(25% - 12px);
      }

      .swiper--good-img .swiper-wrapper .swiper-slide,
      .swiper--gallery-big .swiper-wrapper .swiper-slide{
        flex: 0 0 calc(100%);
      }

      .arrows-swiper,
      .swiper-pagination,
      .arrow-swiper {
        display: none !important;
      }
      .more-block__item {
        display: block;
      }
      .select-box select {
        width: 100%;
        padding: 4px 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--gray-color-600);
        font-size: var(--font-size-xs);
        line-height: 1;
        color: var(--dark-color-500);
        width: fit-content;
        min-width: 91px;
        /* max-width: 260px; */
        width: 100%;
        height: 48px;
        position: relative;

        background-color: var(--white-color);
        gap: 8px;
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        cursor: pointer;
        justify-content: center;
      }

      .select-box select option {
        height: 100%;
        display: flex;
        align-items: center;
      }

      .select-box select option:not(:first-child) {
        position: absolute;
        opacity: 0;
        z-index: -1;
        display: none;
      }
      @media (max-width: 1399px) {
      .swiper-slide {
        flex: 0 0 calc(33.333% - 12px);
      }
    }

    @media (max-width: 991px) {
      .swiper-slide {
        flex: 0 0 calc(50% - 12px);
      }
    }

    @media (max-width: 575px) {
      .swiper-slide {
        flex: 0 0 100%;
      }
    }

      @media (min-width: 1400px) {
        .swiper-wrapper {
          grid-template-columns: repeat(4, 1fr) !important;
        }
        .swiper-slide:nth-child(n + 5) {
          display: none !important;
        }
      }
      @media (max-width: 1399px) and (min-width: 992px) {
        .swiper-wrapper {
          grid-template-columns: repeat(3, 1fr) !important;
        }
        .swiper-slide:nth-child(n + 4) {
          display: none !important;
        }
      }
      @media (max-width: 991px) and (min-width: 768px) {
        .swiper-wrapper {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .swiper-slide:nth-child(n + 3) {
          display: none !important;
        }
      }
      @media (max-width: 767px) and (min-width: 576px) {
        .swiper-wrapper {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .swiper-slide:nth-child(n + 3) {
          display: none !important;
        }
      }
      @media (max-width: 575px) {
        .swiper-wrapper {
          grid-template-columns: 1fr !important;
        }
        .swiper-slide:nth-child(n + 2) {
          display: none !important;
        }
      }
      .swiper--good-img .swiper-wrapper {
        grid-template-columns: repeat(1, 1fr) !important;
      }
      .swiper--good-img .swiper-slide:nth-child(n + 2) {
        display: none !important;
      }
      .swiper {
        width: 100%;
      }
      [data-loading="true"] {
        position: static !important;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
        display: flex !important;
      }

      [data-loader-box] {
        display: none !important;
      }
      [data-block="more-footer"] {
        display: none;
      }
      .accordeon__answer {
        max-height: max-content !important;
        padding-top: 12px;
      }
      .form-hero__head .accordeon__answer {
        max-height: 0 !important;
        padding: 0;
      }
    </style>
  </noscript>
</head>
